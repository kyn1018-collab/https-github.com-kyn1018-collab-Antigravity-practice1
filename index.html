    <!-- Vanilla JS 로직 분리 -->
    <script>
        // PDF.js 글로벌 워커 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // 1. 사전에 PDF 파싱으로 알아낸 35명의 (번호, 이름) 명단 (최우선 탑재)
        const INITIAL_STUDENTS = [
            "1번 김고은", "2번 전지현", "3번 조보아", "4번 김희애", "5번 한지민",
            "6번 아이유", "7번 설인아", "8번 신세경", "9번 김희선", "10번 박신혜",
            "11번 변우석", "12번 박보검", "13번 공유", "14번 남주혁", "15번 강동원",
            "16번 박서준", "17번 이정재", "18번 정우성", "19번 송강", "20번 지창욱",
            "21번 아이린", "22번 김유정", "23번 김태리", "24번 이영애", "25번 장윤정",
            "26번 배수지", "27번 송혜교", "28번 한소희", "29번 김태희", "30번 이민정",
            "31번 공효진", "32번 이준혁", "33번 차은우", "34번 정국", "35번 이동욱"
        ];

        // 2. Web Audio API 기반 오디오 제어 클래스 (무설치 구동)
        class SoundEffects {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            // 슬롯 롤링할 때 틱 소리
            playTick() {
                if (this.muted) return;
                this.init();
                
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.04);
                    
                    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.04);
                    
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.04);
                } catch(e) {
                    console.error("사운드 재생 에러:", e);
                }
            }

            // 당첨되었을 때 축하 멜로디
            playWin() {
                if (this.muted) return;
                this.init();
                
                try {
                    const now = this.ctx.currentTime;
                    const playTone = (freq, start, duration, type='sine') => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        
                        osc.type = type;
                        osc.frequency.setValueAtTime(freq, start);
                        
                        gain.gain.setValueAtTime(0.12, start);
                        gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                        
                        osc.start(start);
                        osc.stop(start + duration);
                    };
                    
                    // 도 - 미 - 솔 - 도 경쾌한 아르페지오
                    playTone(523.25, now, 0.12, 'triangle'); // C5
                    playTone(659.25, now + 0.12, 0.12, 'triangle'); // E5
                    playTone(783.99, now + 0.24, 0.12, 'triangle'); // G5
                    playTone(1046.50, now + 0.36, 0.5, 'sine'); // C6
                } catch(e) {
                    console.error("사운드 재생 에러:", e);
                }
            }
        }

        const sound = new SoundEffects();

        // 3. 앱 상태 관리
        let students = []; // 현재 입력된 학생 배열
        let pickedStudents = new Set(); // 이미 뽑힌 학생 목록
        let isDrawing = false; // 현재 추첨 애니메이션 진행 중 여부

        // DOM 엘리먼트 캐싱
        const studentListTextarea = document.getElementById('studentList');
        const studentCountBadge = document.getElementById('studentCount');
        const remainCountLabel = document.getElementById('remainCount');
        const pickedCountLabel = document.getElementById('pickedCount');
        const screenRemainCountLabel = document.getElementById('screenRemainCount');
        const pickedListContainer = document.getElementById('pickedListContainer');
        const drawButton = document.getElementById('drawButton');
        const slotCard = document.getElementById('slotCard');
        const statusLabel = document.getElementById('statusLabel');
        const winBadge = document.getElementById('winBadge');
        const excludePickedCheckbox = document.getElementById('excludePicked');
        const resetPickedButton = document.getElementById('resetPicked');
        const fileInput = document.getElementById('fileInput');
        const soundToggleBtn = document.getElementById('soundToggle');
        const soundIcon = document.getElementById('soundIcon');
        const soundText = document.getElementById('soundText');

        // 4. 기능 함수 정의

        // 명단 데이터 동기화
        function syncStudentsFromInput() {
            const rawText = studentListTextarea.value;
            students = rawText.split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);
            
            studentCountBadge.textContent = `${students.length}명`;
            updateCounts();
        }

        // 수량 정보 및 화면 숫자 갱신
        function updateCounts() {
            let remain = students.length;
            if (excludePickedCheckbox.checked) {
                // 이미 뽑힌 명단 중 현재 존재하는 명단에 있는 것만 제외
                const activePickedCount = Array.from(pickedStudents).filter(name => students.includes(name)).length;
                remain = students.length - activePickedCount;
            }
            
            remainCountLabel.textContent = Math.max(0, remain);
            screenRemainCountLabel.textContent = Math.max(0, remain);
            pickedCountLabel.textContent = pickedStudents.size;
            
            renderPickedBadges();
        }

        // 뽑힌 학생 배지 목록 렌더링
        function renderPickedBadges() {
            pickedListContainer.innerHTML = '';
            if (pickedStudents.size === 0) {
                pickedListContainer.innerHTML = '<span class="text-xs text-slate-400 italic">아직 뽑힌 학생이 없습니다.</span>';
                return;
            }

            pickedStudents.forEach(name => {
                const badge = document.createElement('span');
                badge.className = "text-xs font-bold bg-red-50 text-red-600 border border-red-100 px-2 py-1 rounded-lg flex items-center gap-1 animate-fade-in shadow-sm";
                badge.innerHTML = `${name} <button class="hover:text-red-800 font-bold focus:outline-none" onclick="removeSinglePicked('${name}')">×</button>`;
                pickedListContainer.appendChild(badge);
            });
        }

        // 특정 학생 한 명을 뽑힌 목록에서 다시 제거
        window.removeSinglePicked = function(name) {
            pickedStudents.delete(name);
            updateCounts();
            sound.playTick();
        };

        // 지능형 (번호, 이름) 텍스트 추출 알고리즘 (명렬표 오탐 방지)
        function parseNamesAndNumbersFromText(text) {
            const lines = text.split('\n');
            const list = [];
            const nameRegex = /^[가-힣]{2,4}$/;
            const numRegex = /^\d+$/;
            
            // 명렬표 노이즈 단어 필터링 블랙리스트
            const blacklist = /^(재적|투표|자수|투표자수|남|여|계|합계|평균|비고|구분|결석|지각|조퇴|결과|체험|실습|테스트|휴대폰|학번|성별|번호|이름|학년|학생|반|전화|주소|일자|날짜|요일|시간|교시|과목|담임|교사|학교|초등|인원|정원|참석|불참|서명|확인|등록|신청|제출|안내|요청|가이드|설정|옵션|기록|초기화|대기|당첨|주인공|축하|나이스|neis|학급)$/i;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // 공백, 쉼표, 온점, 하이픈, 괄호 등으로 토큰 분리
                const tokens = line.split(/[\s,./\-_()]+/).filter(t => t.length > 0);
                if (tokens.length === 0) continue;
                
                // 1. 이름 토큰 찾기 (2~4자 한글이며 블랙리스트에 없어야 함)
                let name = null;
                let nameIndex = -1;
                for (let i = 0; i < tokens.length; i++) {
                    const token = tokens[i];
                    if (nameRegex.test(token) && !blacklist.test(token)) {
                        name = token;
                        nameIndex = i;
                        break;
                    }
                }
                
                // 이름을 찾지 못했으면 패스
                if (!name) continue;
                
                // 2. 번호 찾기 (학적 정보 꼬임 방지를 위해 맨 앞 또는 맨 뒤 토큰 우선 탐색)
                let number = null;
                
                // 규칙 A: 맨 앞 토큰이 숫자이고 1~100 사이인 경우
                if (numRegex.test(tokens[0])) {
                    const val = parseInt(tokens[0], 10);
                    if (val > 0 && val <= 100) {
                        number = val;
                    }
                }
                
                // 규칙 B: 맨 앞이 숫자가 아니고 맨 뒤 토큰이 숫자이며 1~100 사이인 경우
                if (number === null && numRegex.test(tokens[tokens.length - 1])) {
                    const val = parseInt(tokens[tokens.length - 1], 10);
                    if (val > 0 && val <= 100) {
                        number = val;
                    }
                }
                
                // 규칙 C: 맨 앞과 맨 뒤에서 찾지 못했지만 전체 문맥 중 숫자가 단 하나만 존재하는 경우 폴백
                if (number === null) {
                    const numbersInLine = tokens.filter(t => numRegex.test(t)).map(t => parseInt(t, 10));
                    if (numbersInLine.length === 1) {
                        const val = numbersInLine[0];
                        if (val > 0 && val <= 100) {
                            number = val;
                        }
                    }
                }
                
                list.push({
                    name: name,
                    number: number !== null ? number : ""
                });
            }
            
            // 번호 순 정렬
            list.sort((a, b) => {
                if (a.number !== "" && b.number !== "") return a.number - b.number;
                if (a.number !== "") return -1;
                if (b.number !== "") return 1;
                return 0;
            });
            
            // 번호번 이름 또는 이름 형태로 가공 반환
            return list.map(item => {
                if (item.number !== "") {
                    return `${item.number}번 ${item.name}`;
                }
                return item.name;
            });
        }

        // PDF 파일 파싱 (Promise 기반)
        async function parsePdfFile(file) {
            return new Promise((resolve, reject) => {
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    try {
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(" ");
                            fullText += pageText + "\n";
                        }
                        resolve(fullText);
                    } catch (err) {
                        reject(err);
                    }
                };
                fileReader.onerror = () => reject(fileReader.error);
                fileReader.readAsArrayBuffer(file);
            });
        }

        // HWPX 한글 파일 파싱 (JSZip 기반)
        async function parseHwpxFile(file) {
            return new Promise((resolve, reject) => {
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    try {
                        const zip = await JSZip.loadAsync(this.result);
                        const sectionFiles = Object.keys(zip.files).filter(name => name.startsWith('Contents/section'));
                        
                        if (sectionFiles.length === 0) {
                            reject(new Error("한글 파일(section.xml) 구조를 찾을 수 없습니다."));
                            return;
                        }
                        
                        let fullText = "";
                        for (const fileName of sectionFiles) {
                            const xmlText = await zip.file(fileName).async("string");
                            // <hp:t> 태그 내의 한글 텍스트 추출
                            const regex = /<hp:t[^>]*>(.*?)<\/hp:t>/g;
                            let match;
                            while ((match = regex.exec(xmlText)) !== null) {
                                // XML 엔티티 디코딩
                                let textNode = match[1]
                                    .replace(/&amp;/g, "&")
                                    .replace(/&lt;/g, "<")
                                    .replace(/&gt;/g, ">")
                                    .replace(/&quot;/g, '"')
                                    .replace(/&#39;/g, "'");
                                fullText += textNode + "\n";
                            }
                        }
                        resolve(fullText);
                    } catch (err) {
                        reject(err);
                    }
                };
                fileReader.onerror = () => reject(fileReader.error);
                fileReader.readAsArrayBuffer(file);
            });
        }

        // 텍스트 파일 파싱 (인코딩 자동 감지)
        async function parseTextFile(file) {
            return new Promise((resolve, reject) => {
                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const text = this.result;
                    // 깨진 문자가 보이면 EUC-KR로 다시 읽음 (ANSI 텍스트 파일 지원)
                    if (text.includes('')) {
                        const fallbackReader = new FileReader();
                        fallbackReader.onload = function() {
                            resolve(this.result);
                        };
                        fallbackReader.readAsText(file, "EUC-KR");
                    } else {
                        resolve(text);
                    }
                };
                fileReader.onerror = () => reject(fileReader.error);
                fileReader.readAsText(file, "UTF-8");
            });
        }

        // 추첨 룰렛(슬롯머신) 실행 함수
        function startDrawing() {
            if (isDrawing) return;

            // 명단 예외 처리
            if (students.length === 0) {
                alert("⚠️ 학생 명단이 비어있습니다! 명단을 먼저 채워주세요.");
                return;
            }

            // 가용 명단 걸러내기
            let pool = [...students];
            if (excludePickedCheckbox.checked) {
                pool = students.filter(name => !pickedStudents.has(name));
            }

            // 모든 명단이 다 선발되었을 때의 자동 리셋 로직
            if (pool.length === 0) {
                alert("🔔 모든 학생이 한 번씩 뽑혔습니다! 기록을 자동으로 초기화하고 처음부터 다시 뽑습니다.");
                pickedStudents.clear();
                updateCounts();
                pool = [...students];
            }

            // 애니메이션 시작
            isDrawing = true;
            drawButton.disabled = true;
            drawButton.classList.add('opacity-60', 'cursor-not-allowed');
            winBadge.classList.add('hidden');
            winBadge.classList.remove('scale-100');
            winBadge.classList.add('scale-0');
            statusLabel.textContent = "두구두구... 과연 당첨자는?!";
            statusLabel.classList.add('animate-pulse');

            sound.init();

            let counter = 0;
            const maxTicks = 25; // 총 롤링 횟수
            let delay = 50; // 시작 지연시간 (ms)

            function roll() {
                counter++;
                const tempIndex = Math.floor(Math.random() * pool.length);
                const tempName = pool[tempIndex];
                
                slotCard.textContent = tempName;
                sound.playTick();

                // 3D 튕김 효과 애니메이션 클래스 제어
                slotCard.style.transform = `scale(${1 + Math.random()*0.15}) rotate(${Math.random()*4 - 2}deg)`;

                if (counter < maxTicks) {
                    // 갈수록 속도가 느려지는 슬롯머신 연출
                    if (counter > maxTicks * 0.7) {
                        delay += 35;
                    } else if (counter > maxTicks * 0.4) {
                        delay += 15;
                    }
                    setTimeout(roll, delay);
                } else {
                    finalizeDraw(pool);
                }
            }

            roll();
        }

        // 최종 당첨자 결과 처리
        function finalizeDraw(pool) {
            const finalIndex = Math.floor(Math.random() * pool.length);
            const winner = pool[finalIndex];

            // 결과 표기 및 애니메이션 스타일 부여
            slotCard.textContent = winner;
            slotCard.style.transform = 'scale(1.2)';
            statusLabel.textContent = "🎉 당첨을 축하합니다! 🎉";
            statusLabel.classList.remove('animate-pulse');

            // 당첨 주인공 뱃지 활성화
            winBadge.classList.remove('hidden');
            setTimeout(() => {
                winBadge.classList.remove('scale-0');
                winBadge.classList.add('scale-100');
            }, 50);

            // 소리 효과 및 Confetti 폭죽 효과 터뜨리기
            sound.playWin();
            
            // Confetti 커스텀 설정
            const end = Date.now() + 800;
            const colors = ['#4ade80', '#fbbf24', '#3b82f6', '#f43f5e'];

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 중복 방지 저장
            pickedStudents.add(winner);
            
            // 상태 해제
            isDrawing = false;
            drawButton.disabled = false;
            drawButton.classList.remove('opacity-60', 'cursor-not-allowed');

            updateCounts();
        }

        // 5. 이벤트 리스너 등록

        // 초기 로드 시 기존 파일이 존재하면 파싱 데이터 주입
        window.addEventListener('DOMContentLoaded', () => {
            studentListTextarea.value = INITIAL_STUDENTS.join('\n');
            syncStudentsFromInput();
        });

        // 텍스트 변경 감지
        studentListTextarea.addEventListener('input', syncStudentsFromInput);

        // 옵션 스위치 작동 시 수치 재계산
        excludePickedCheckbox.addEventListener('change', updateCounts);

        // 뽑기 버튼 클릭
        drawButton.addEventListener('click', startDrawing);

        // 전체 초기화
        resetPickedButton.addEventListener('click', () => {
            if (confirm("정말 모든 추첨 기록을 초기화하시겠습니까?")) {
                pickedStudents.clear();
                updateCounts();
                slotCard.textContent = "❓❓❓";
                slotCard.style.transform = 'scale(1)';
                statusLabel.textContent = "추첨을 진행해주세요!";
                winBadge.classList.add('hidden');
                winBadge.classList.remove('scale-100');
                winBadge.classList.add('scale-0');
                sound.playTick();
            }
        });

        // 사운드 온오프 제어
        soundToggleBtn.addEventListener('click', () => {
            sound.muted = !sound.muted;
            if (sound.muted) {
                soundIcon.textContent = "🔇";
                soundText.textContent = "소리 끔";
                soundToggleBtn.classList.remove('bg-slate-100', 'text-slate-700');
                soundToggleBtn.classList.add('bg-red-50', 'text-red-500');
            } else {
                soundIcon.textContent = "🔊";
                soundText.textContent = "소리 켬";
                soundToggleBtn.classList.remove('bg-red-50', 'text-red-500');
                soundToggleBtn.classList.add('bg-slate-100', 'text-slate-700');
                sound.playTick();
            }
        });

        // 로컬 파일 드래그앤드롭/파일업로드 실시간 파싱 처리 (PDF, HWPX, TXT, CSV 통합)
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const extension = file.name.split('.').pop().toLowerCase();
            statusLabel.textContent = "📄 파일 분석 중...";

            try {
                let extractedText = "";
                if (extension === 'pdf') {
                    extractedText = await parsePdfFile(file);
                } else if (extension === 'hwpx') {
                    extractedText = await parseHwpxFile(file);
                } else if (extension === 'txt' || extension === 'csv') {
                    extractedText = await parseTextFile(file);
                } else {
                    throw new Error("지원하지 않는 파일 형식입니다. (PDF, HWPX, TXT, CSV 지원)");
                }

                const parsedList = parseNamesAndNumbersFromText(extractedText);
                if (parsedList.length > 0) {
                    studentListTextarea.value = parsedList.join('\n');
                    syncStudentsFromInput();
                    statusLabel.textContent = "준비 완료!";
                    alert(`🎉 파일로부터 ${parsedList.length}명의 학생 명단을 성공적으로 추출하여 등록했습니다!`);
                } else {
                    statusLabel.textContent = "분석 실패";
                    alert("⚠️ 파일 내에서 학생 이름을 검출하지 못했습니다. 명단 형식을 확인해주세요.");
                }
            } catch (error) {
                console.error(error);
                statusLabel.textContent = "에러 발생";
                alert(`⚠️ 파일 로드 중 오류가 발생했습니다: ${error.message}`);
            }
            
            // 동일 파일 재업로드 시 이벤트 재발화를 위해 값 초기화
            fileInput.value = "";
        });

    </script>
